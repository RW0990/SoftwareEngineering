<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Band Site - Cart</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="top-bar">
      <img src="logo.png" alt="Band Logo" class="logo" />

      <nav class="menu-bar">
        <ul>
          <li><a href="/dashboard.html">Main</a></li>
          <li><a href="/contact.html">Contact</a></li>
          <li><a href="/merchandise.html">Merch</a></li>
          <li><a href="/tickets.html">Tickets</a></li>
          <li><a href="/login.html">Login</a></li>
        </ul>
      </nav>
    </header>

    <div class="basket">
      <img src="basket-icon.png" alt="Basket Icon" />
      <p>Basket</p>
    </div>

    <main class="cart-page">
      <h1>Your Cart</h1>

      <div class="cart-items"></div>

      <div class="cart-empty" hidden>
        <p>Your cart is empty.</p>
      </div>

      <div class="cart-summary">
        <p class="cart-total">Total: $<span id="cart-total-amount">0</span></p>
        <button type="button" id="checkout-btn">Checkout</button>
      </div>
    </main>
  </body>
</html>
